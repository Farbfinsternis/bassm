<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BASSM Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
      color: #ccc;
    }
    #controls {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      height: 28px;
    }
    #controls button {
      padding: 1px 8px;
      cursor: pointer;
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 2px;
      font-size: 11px;
      font-family: monospace;
    }
    #controls button:hover { background: #3a3a3a; border-color: #666; }
    #controls button:disabled { opacity: 0.4; cursor: default; }
    #status {
      color: #666;
      font-size: 11px;
      margin-left: 8px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #666;
      font-size: 12px;
    }
    #spinner-ring {
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #666;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="controls">
    <button id="btn-run"   disabled>Run</button>
    <button id="btn-halt"  disabled>Halt</button>
    <button id="btn-reset" disabled>Reset</button>
    <span id="status">Loading WASM...</span>
  </div>

  <div id="canvas-wrap">
    <div id="spinner">
      <div id="spinner-ring"></div>
      <span>Initializing emulator...</span>
    </div>
    <canvas id="canvas" width="724" height="568"
      oncontextmenu="event.preventDefault()" tabindex="-1"
      style="display:none">
    </canvas>
  </div>

  <script>
    // ── Rendering ──────────────────────────────────────────────────────────
    const TPP = 1, HBLANK_MIN = 18, HPIXELS = 912, VPIXELS = 313;
    let xOff = 18, yOff = 32, clipped_width = HPIXELS - xOff - 8, clipped_height = VPIXELS - yOff;
    let ctx = null, image_data = null, use_ntsc_pixel = false;

    function startRender() { startAnimationLoop(); stop_raf = false; requestAnimationFrame(do_animation_frame); }

    function message_handler(msg, data, data2) {
      console.log('[vAmiga msg]', msg, data, data2);
      const s = document.getElementById('status');
      if (!s) return;
      if      (msg === 'MSG_ROM_MISSING')   { s.textContent = 'Waiting for ROM'; }
      else if (msg === 'MSG_READY_TO_RUN')  { s.textContent = 'Ready'; Module._wasm_run(); startRender(); }
      else if (msg === 'MSG_RUN')           { s.textContent = 'Running'; }
      else if (msg === 'MSG_PAUSE')         { s.textContent = 'Paused'; }
    }

    function create2d_context() {
      const canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d');
      image_data = ctx.createImageData(912, 313);
    }

    function render_canvas() {
      const e = Module._wasm_pixel_buffer() + 3648 * yOff;
      const t = new Uint8Array(Module.HEAPU32.buffer, e, 912 * clipped_height << 2);
      image_data.data.set(t);
      ctx.putImageData(image_data, -xOff, 0, xOff, 0, clipped_width, clipped_height);
    }

    // ── Animation loop ─────────────────────────────────────────────────────
    let stop_raf = true, do_animation_frame = null, queued_executes = 0;

    function startAnimationLoop() {
      if (do_animation_frame !== null) return;
      const execute_frame = () => { Module._wasm_execute(); queued_executes--; };
      do_animation_frame = (now) => {
        const behind = Module._wasm_draw_one_frame(now);
        if (behind >= 0) {
          render_canvas();
          while (behind > queued_executes) { queued_executes++; setTimeout(execute_frame); }
        }
        if (!stop_raf) requestAnimationFrame(do_animation_frame);
      };
    }

    // ── Viewport callback from vAmiga ──────────────────────────────────────
    function js_set_display(a, b, c, d) {
      const x = a * TPP - HBLANK_MIN * 4; xOff = x >= 0 ? x : 0; yOff = b;
      clipped_width = c; clipped_height = d % 2 ? d + 1 : d;
      if (clipped_height + yOff > VPIXELS) clipped_height = (VPIXELS - yOff) & 0xfffe;
      const e = document.getElementById('canvas'); e.width = clipped_width; e.height = clipped_height;
      scaleVMCanvas();
    }

    function scaleVMCanvas() {
      const e = document.getElementById('canvas'), w = document.getElementById('canvas-wrap');
      if (!w.clientWidth || !w.clientHeight) return;
      const r = 320 / 256, q = w.clientWidth / w.clientHeight;
      if (q > r) { e.style.height = w.clientHeight + 'px'; e.style.width = Math.round(w.clientHeight * r) + 'px'; }
      else        { e.style.width = w.clientWidth + 'px';  e.style.height = Math.round(w.clientWidth / r) + 'px'; }
    }

    // ── Paula audio ────────────────────────────────────────────────────────
    function setupAudio() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        window._vAmigaAudioCtx = ctx;
        console.log('[BASSM] AudioContext state=' + ctx.state + ' sampleRate=' + ctx.sampleRate);
        if (!Module._wasm_leftChannelBuffer || !Module._wasm_rightChannelBuffer ||
            !Module._wasm_update_audio || !Module._wasm_set_sample_rate) {
          console.warn('[BASSM] Audio WASM API not available'); return;
        }
        Module._wasm_set_sample_rate(ctx.sampleRate);
        var lAddr = Module._wasm_leftChannelBuffer(), rAddr = Module._wasm_rightChannelBuffer();
        var audioOffset = 0;
        var node = ctx.createScriptProcessor(1024, 0, 2);
        node.onaudioprocess = function (ev) {
          Module._wasm_update_audio(audioOffset);
          var buf = Module.HEAPU32.buffer, off = audioOffset * 4;
          ev.outputBuffer.getChannelData(0).set(new Float32Array(buf, lAddr + off, 1024));
          ev.outputBuffer.getChannelData(1).set(new Float32Array(buf, rAddr + off, 1024));
          audioOffset = audioOffset === 0 ? 1024 : 0;
        };
        node.connect(ctx.destination);
        window._vAmigaAudioNode = node;
        document.addEventListener('click', function () {
          if (ctx.state === 'suspended') ctx.resume().then(() => console.log('[BASSM] Audio resumed'));
        });
        ctx.resume().catch(function (e) { console.warn('[BASSM] Audio resume failed:', e); });
      } catch (ex) { console.warn('[BASSM] Audio init failed:', ex.message); }
    }

    // ── InitWrappers — called by Emscripten postRun ────────────────────────
    function InitWrappers() {
      create2d_context();
      const statusEl = document.getElementById('status');
      const spinner  = document.getElementById('spinner');
      const canvas   = document.getElementById('canvas');

      // Configure RAM before first ROM load
      try { Module._wasm_halt(); Module.ccall('wasm_configure','string',['string','string'],['MEM.CHIP_RAM','1024']); } catch(ex) {}
      try { Module.ccall('wasm_configure','string',['string','string'],['MEM.SLOW_RAM','512']); } catch(ex) {}
      try { Module.ccall('wasm_configure','string',['string','string'],['FAST_RAM','8192']); } catch(ex) {}

      statusEl.textContent = 'Ready — waiting for ROM';
      spinner.style.display = 'none';
      canvas.style.display  = 'block';
      scaleVMCanvas();
      window.addEventListener('resize', scaleVMCanvas);

      document.getElementById('btn-run').disabled   = false;
      document.getElementById('btn-halt').disabled  = false;
      document.getElementById('btn-reset').disabled = false;

      document.getElementById('btn-run').onclick = () => {
        Module._wasm_run(); startAnimationLoop(); stop_raf = false;
        requestAnimationFrame(do_animation_frame); statusEl.textContent = 'Running';
      };
      document.getElementById('btn-halt').onclick  = () => { Module._wasm_halt(); stop_raf = true; statusEl.textContent = 'Halted'; };
      document.getElementById('btn-reset').onclick = () => { Module._wasm_reset(); statusEl.textContent = 'Reset'; };

      // ── Mouse input → Amiga port 1 ────────────────────────────────────
      let _prevMouseX = null, _prevMouseY = null;
      canvas.addEventListener('mousemove', (e) => {
        if (!Module._wasm_mouse) return;
        if (_prevMouseX !== null) {
          const dx = e.clientX - _prevMouseX, dy = e.clientY - _prevMouseY;
          if (dx !== 0 || dy !== 0) Module._wasm_mouse(0, dx, dy);
        }
        _prevMouseX = e.clientX; _prevMouseY = e.clientY;
      });
      canvas.addEventListener('mouseleave', () => { _prevMouseX = null; _prevMouseY = null; });
      canvas.addEventListener('mousedown', (e) => { if (Module._wasm_mouse_button) Module._wasm_mouse_button(0, e.button === 2 ? 1 : 0, 1); });
      canvas.addEventListener('mouseup',   (e) => { if (Module._wasm_mouse_button) Module._wasm_mouse_button(0, e.button === 2 ? 1 : 0, 0); });

      // ── Electron IPC bridge ─────────────────────────────────────────────
      if (window.electronAPI) window.electronAPI.onCommand((cmd) => handleCommand(cmd));
      setupAudio();
      if (window.electronAPI) window.electronAPI.ready();
    }

    function handleCommand(cmd) {
      const statusEl = document.getElementById('status');
      switch (cmd.type) {
        case 'load-rom': {
          Module._wasm_halt();
          try { Module.ccall('wasm_configure','string',['string','string'],['MEM.CHIP_RAM','1024']); } catch(ex) {}
          try { Module.ccall('wasm_configure','string',['string','string'],['MEM.SLOW_RAM','512']);  } catch(ex) {}
          try { Module.ccall('wasm_configure','string',['string','string'],['FAST_RAM','8192']);     } catch(ex) {}
          const buf = new Uint8Array(cmd.data), ptr = Module._malloc(buf.byteLength);
          Module.HEAPU8.set(buf, ptr);
          const r = Module.ccall('wasm_loadFile','string',['string','number','number','number'],['aros.rom_file', ptr, buf.byteLength, 0]);
          Module._free(ptr); statusEl.textContent = r || 'ROM loaded';
          break;
        }
        case 'load-ext': {
          const buf = new Uint8Array(cmd.data), ptr = Module._malloc(buf.byteLength);
          Module.HEAPU8.set(buf, ptr);
          const r = Module.ccall('wasm_loadFile','string',['string','number','number','number'],['aros_ext.rom_ext_file', ptr, buf.byteLength, 0]);
          Module._free(ptr);
          Module.ccall('wasm_configure','string',['string','string'],['warp_to_frame','300']);
          statusEl.textContent = r || 'Ext ROM loaded';
          break;
        }
        case 'load-exe': {
          console.log('[preview] load-exe received, bytes=', cmd.data?.length);
          const buf = new Uint8Array(cmd.data), ptr = Module._malloc(buf.byteLength);
          Module.HEAPU8.set(buf, ptr);
          const r = Module.ccall('wasm_loadFile','string',['string','number','number','number'],['program.exe', ptr, buf.byteLength, 0]);
          Module._free(ptr); console.log('[preview] wasm_loadFile result=', r || '(ok)');
          queued_executes = 0; Module._wasm_reset(); Module._wasm_run(); startRender();
          if (window._vAmigaAudioCtx && window._vAmigaAudioCtx.state === 'suspended') window._vAmigaAudioCtx.resume();
          statusEl.textContent = 'Running — booting from disk';
          break;
        }
        case 'power-on': Module._wasm_power_on(); statusEl.textContent = 'Powered on'; break;
        case 'run':   document.getElementById('btn-run').click();   break;
        case 'halt':  document.getElementById('btn-halt').click();  break;
        case 'reset': document.getElementById('btn-reset').click(); break;
      }
    }

    // ── Emscripten Module configuration ───────────────────────────────────
    var Module = {
      preRun:  [],
      postRun: [InitWrappers],
      canvas: document.getElementById('canvas'),
      print:    (text) => console.log('[vAmiga]', text),
      printErr: (text) => console.error('[vAmiga]', text),
      setStatus: (text) => { if (text) document.getElementById('status').textContent = text; },
      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        Module.totalDependencies = Math.max(Module.totalDependencies, left);
        Module.setStatus(left ? `Loading... (${Module.totalDependencies - left}/${Module.totalDependencies})` : 'All downloads complete.');
      }
    };
  </script>

  <script async src=vAmiga.js></script>
</body>
</html>
