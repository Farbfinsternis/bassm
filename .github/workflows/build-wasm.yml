name: Build vAmiga WASM

on:
  push:
    paths:
      - 'emulator/vAmigaWeb/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify emcc
        run: emcc --version

      - name: Configure (CMake + Emscripten)
        working-directory: emulator/vAmigaWeb
        run: |
          mkdir -p build
          cd build
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build WASM
        working-directory: emulator/vAmigaWeb/build
        run: emmake make -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p dist-wasm
          cp emulator/vAmigaWeb/build/vAmiga.wasm dist-wasm/
          cp emulator/vAmigaWeb/build/vAmiga.js   dist-wasm/
          cp emulator/vAmigaWeb/build/vAmiga.html dist-wasm/preview.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vamiga-wasm
          path: dist-wasm/
          retention-days: 30
