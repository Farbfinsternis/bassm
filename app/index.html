<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
		<meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
		<title>BASSM</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div id="toolbar">
			<button id="btn-run">&#9654; Run</button>
			<span id="status">Initialising...</span>
		</div>

		<div id="editor-pane">
			<textarea id="editor" spellcheck="false">; 8 Bouncing Boxes Demo (Double-Buffering)
; 8 verschieden farbige 16x16-Boxes springen gleichzeitig ab.
; 4 Bitplanes = 16 Farben. Kein Tearing dank ScreenFlip.
Graphics 320,256,4

PaletteColor 0,0,0,0      ; 0 = Schwarz (Hintergrund)
PaletteColor 1,15,0,0     ; 1 = Rot
PaletteColor 2,0,15,0     ; 2 = Gruen
PaletteColor 3,0,0,15     ; 3 = Blau
PaletteColor 4,15,15,0    ; 4 = Gelb
PaletteColor 5,0,15,15    ; 5 = Cyan
PaletteColor 6,15,0,15    ; 6 = Magenta
PaletteColor 7,15,8,0     ; 7 = Orange
PaletteColor 8,15,15,15   ; 8 = Weiss

ClsColor 0

x1 = 10
y1 = 20
dx1 = 3
dy1 = 2
x2 = 100
y2 = 50
dx2 = -4
dy2 = 3
x3 = 200
y3 = 10
dx3 = 2
dy3 = -3
x4 = 50
y4 = 150
dx4 = -3
dy4 = -2
x5 = 250
y5 = 100
dx5 = 4
dy5 = 2
x6 = 130
y6 = 200
dx6 = -2
dy6 = 4
x7 = 80
y7 = 120
dx7 = 5
dy7 = -3
x8 = 280
y8 = 180
dx8 = -3
dy8 = 5

While 1
  Cls

  x1 = x1 + dx1
  y1 = y1 + dy1
  If x1 < 0
    x1 = 0
    dx1 = -dx1
  EndIf
  If x1 > 304
    x1 = 304
    dx1 = -dx1
  EndIf
  If y1 < 0
    y1 = 0
    dy1 = -dy1
  EndIf
  If y1 > 240
    y1 = 240
    dy1 = -dy1
  EndIf
  Color 1
  Box x1,y1,16,16

  x2 = x2 + dx2
  y2 = y2 + dy2
  If x2 < 0
    x2 = 0
    dx2 = -dx2
  EndIf
  If x2 > 304
    x2 = 304
    dx2 = -dx2
  EndIf
  If y2 < 0
    y2 = 0
    dy2 = -dy2
  EndIf
  If y2 > 240
    y2 = 240
    dy2 = -dy2
  EndIf
  Color 2
  Box x2,y2,16,16

  x3 = x3 + dx3
  y3 = y3 + dy3
  If x3 < 0
    x3 = 0
    dx3 = -dx3
  EndIf
  If x3 > 304
    x3 = 304
    dx3 = -dx3
  EndIf
  If y3 < 0
    y3 = 0
    dy3 = -dy3
  EndIf
  If y3 > 240
    y3 = 240
    dy3 = -dy3
  EndIf
  Color 3
  Box x3,y3,16,16

  x4 = x4 + dx4
  y4 = y4 + dy4
  If x4 < 0
    x4 = 0
    dx4 = -dx4
  EndIf
  If x4 > 304
    x4 = 304
    dx4 = -dx4
  EndIf
  If y4 < 0
    y4 = 0
    dy4 = -dy4
  EndIf
  If y4 > 240
    y4 = 240
    dy4 = -dy4
  EndIf
  Color 4
  Box x4,y4,16,16

  x5 = x5 + dx5
  y5 = y5 + dy5
  If x5 < 0
    x5 = 0
    dx5 = -dx5
  EndIf
  If x5 > 304
    x5 = 304
    dx5 = -dx5
  EndIf
  If y5 < 0
    y5 = 0
    dy5 = -dy5
  EndIf
  If y5 > 240
    y5 = 240
    dy5 = -dy5
  EndIf
  Color 5
  Box x5,y5,16,16

  x6 = x6 + dx6
  y6 = y6 + dy6
  If x6 < 0
    x6 = 0
    dx6 = -dx6
  EndIf
  If x6 > 304
    x6 = 304
    dx6 = -dx6
  EndIf
  If y6 < 0
    y6 = 0
    dy6 = -dy6
  EndIf
  If y6 > 240
    y6 = 240
    dy6 = -dy6
  EndIf
  Color 6
  Box x6,y6,16,16

  x7 = x7 + dx7
  y7 = y7 + dy7
  If x7 < 0
    x7 = 0
    dx7 = -dx7
  EndIf
  If x7 > 304
    x7 = 304
    dx7 = -dx7
  EndIf
  If y7 < 0
    y7 = 0
    dy7 = -dy7
  EndIf
  If y7 > 240
    y7 = 240
    dy7 = -dy7
  EndIf
  Color 7
  Box x7,y7,16,16

  x8 = x8 + dx8
  y8 = y8 + dy8
  If x8 < 0
    x8 = 0
    dx8 = -dx8
  EndIf
  If x8 > 304
    x8 = 304
    dx8 = -dx8
  EndIf
  If y8 < 0
    y8 = 0
    dy8 = -dy8
  EndIf
  If y8 > 240
    y8 = 240
    dy8 = -dy8
  EndIf
  Color 8
  Box x8,y8,16,16

  ScreenFlip
Wend
</textarea>
			<div id="console"></div>
		</div>

		<script type="module" src="src/bassm.js"></script>
	</body>
</html>
