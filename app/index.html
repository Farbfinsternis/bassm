<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
		<meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
		<title>BASSM</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div id="toolbar">
			<button id="btn-run">&#9654; Run</button>
			<span id="status">Initialising...</span>
		</div>

		<div id="editor-pane">
			<textarea id="editor" spellcheck="false">; Rasterbalken + 8 Bouncing Boxes
; M-COPPER: CopperColor setzt COLOR00 per Rasterzeile im Copper -- CPU-frei!
; 212 Zeilen Farbverlauf, jede Zeile eine andere Farbe (voll Amiga).
; 4 Bitplanes = 16 Farben. Kein Tearing dank ScreenFlip.
Graphics 320,256,4

ClsColor 0

Dim bx(7) : Dim by(7) : Dim bdx(7) : Dim bdy(7)

bx(0)=10  : by(0)=20  : bdx(0)=3  : bdy(0)=2
bx(1)=100 : by(1)=50  : bdx(1)=-4 : bdy(1)=3
bx(2)=200 : by(2)=10  : bdx(2)=2  : bdy(2)=-3
bx(3)=50  : by(3)=150 : bdx(3)=-3 : bdy(3)=-2
bx(4)=250 : by(4)=100 : bdx(4)=4  : bdy(4)=2
bx(5)=130 : by(5)=200 : bdx(5)=-2 : bdy(5)=4
bx(6)=80  : by(6)=120 : bdx(6)=5  : bdy(6)=-3
bx(7)=280 : by(7)=180 : bdx(7)=-3 : bdy(7)=5

t = 0

While 1
  Cls

  ; Rasterbalken: animierter RGB-Farbverlauf ueber alle 212 sichtbaren Zeilen
  ; CopperColor aendert COLOR00 im Copper -- kein CPU-Overhead waehrend Raster!
  t = t + 1
  If t > 15 : t = 0 : EndIf

  For line = 0 To 211
    ; Phase-verschobener Gradient: R steigt, B faellt, G Sinus-aehnlich
    rc = (line + t * 13) / 14
    If rc > 15 : rc = 15 : EndIf
    gc = (line * 2 + t * 7) / 28
    If gc > 15 : gc = 15 : EndIf
    bc = 15 - rc
    CopperColor line, rc, gc, bc
  Next line

  ; Bouncing Boxes ueber dem Rasterbalken-Hintergrund
  For i = 0 To 7
    bx(i) = bx(i) + bdx(i)
    by(i) = by(i) + bdy(i)
    If bx(i) < 0
      bx(i) = 0
      bdx(i) = -bdx(i)
    EndIf
    If bx(i) > 304
      bx(i) = 304
      bdx(i) = -bdx(i)
    EndIf
    If by(i) < 0
      by(i) = 0
      bdy(i) = -bdy(i)
    EndIf
    If by(i) > 240
      by(i) = 240
      bdy(i) = -bdy(i)
    EndIf
    Color i + 1
    Box bx(i),by(i),16,16
  Next i

  ScreenFlip
Wend
</textarea>
			<div id="console"></div>
		</div>

		<script type="module" src="src/bassm.js"></script>
	</body>
</html>
