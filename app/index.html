		<script type="text/x-bassm" id="initial-source">
; BASSM LANG-A + LANG-B Test -- And / Or / Not / Mod operators
;
; Visueller Test:
;   Reihe 1 (y=20):  Or  in Bounce-Bedingung   — Box prallt an beiden Waenden ab
;   Reihe 2 (y=100): And in Farb-Bedingung      — Farbe wechselt nur in der Mitte
;   Reihe 3 (y=180): Not als Schleifenabbruch   — zaehlt bis 60, dann stop

Graphics 320,256,4

PaletteColor 0,  0,  0,  0   ; schwarz
PaletteColor 1, 15, 15, 15   ; weiss
PaletteColor 2, 15,  4,  0   ; rot
PaletteColor 3,  0, 14,  4   ; gruen
PaletteColor 4,  4,  8, 15   ; blau

; ── Test 1: Or in Bounce-Bedingung ────────────────────────────────────────────
; Bouncing box — Richtungsumkehr wenn x < 5 Or x > 305
x1 = 160 : dx = 3

For frame = 1 To 200
  Cls
  x1 = x1 + dx
  If x1 < 5 Or x1 > 305 Then dx = -dx   ; OR
  Color 1
  Box x1, 20, 14, 14
  ScreenFlip
Next frame

; ── Test 2: And in kombinierter Bedingung ─────────────────────────────────────
; Box laeuft durch — gruen in der Mitte (80..240), rot an den Raendern
Cls
For i = 0 To 319
  Color 2                              ; Standard: rot
  If i >= 80 And i <= 240 Then Color 3 ; AND: nur in der Mitte gruen
  Box i, 100, 1, 40
Next i
ScreenFlip
WaitKey

; ── Test 3: Not als Schleifenbedingung ────────────────────────────────────────
; zaehlt hoch bis done gesetzt wird
Cls
done = 0
counter = 0
While Not done                      ; NOT
  counter = counter + 1
  Color 4
  Box counter * 5, 180, 4, 30
  If counter >= 60 Then done = -1   ; Blitz2D true = -1
  ScreenFlip
Wend

; ── Test 4: And/Or als Wert (Zuweisung) ───────────────────────────────────────
; mask = $0F And $FF = $0F -> gruen wenn = 15
mask = $0F And $FF
If mask = 15 Then Color 3 Else Color 2
Box 10, 230, 30, 14

; flags: bit0 = 1, bit1 = 1 -> Or ergibt 3
flags = 1 Or 2
If flags = 3 Then Color 3 Else Color 2
Box 50, 230, 30, 14

; Not 0 = -1 -> blaue Box wenn = -1
notval = Not 0
If notval = -1 Then Color 4 Else Color 2
Box 90, 230, 30, 14

; ── Test 5: Mod — Frame-Cycling und Wraparound ────────────────────────────────
; 16 Boxen nebeneinander, Farbe = i Mod 4 (zyklisch 0-3)
Cls
For i = 0 To 15
  Color (i Mod 4) + 1
  Box i * 20, 50, 18, 50
Next i

; Bounce mit Mod: x laeuft 0..319 und wraps
x = 0
For t = 0 To 400
  Cls
  x = (x + 3) Mod 320
  Color 1
  Box x, 130, 14, 14
  ScreenFlip
Next t

WaitKey
		</script>
